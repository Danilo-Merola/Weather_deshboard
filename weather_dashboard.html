
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body, #root {
    background: #0a0a0f;
    color: #e8e6f0;
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
  }

  .app {
    min-height: 100vh;
    background: #0a0a0f;
    padding: 2rem 1.5rem;
    position: relative;
    overflow: hidden;
  }

  .bg-glow {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
  }
  .glow-1 { background: #6c63ff; top: -200px; left: -200px; }
  .glow-2 { background: #00d4ff; bottom: -200px; right: -200px; }

  .content { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; }

  .header { margin-bottom: 2rem; }
  .header h1 { font-size: 13px; letter-spacing: 0.2em; color: #6c6a80; text-transform: uppercase; margin-bottom: 0.5rem; font-family: 'DM Mono', monospace; font-weight: 400; }

  .search-row { display: flex; gap: 10px; align-items: center; }
  .search-input {
    flex: 1;
    background: #13121a;
    border: 1px solid #2a2840;
    border-radius: 12px;
    padding: 12px 18px;
    color: #e8e6f0;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input::placeholder { color: #3d3b52; }
  .search-input:focus { border-color: #6c63ff; }
  .search-btn {
    background: #6c63ff;
    border: none;
    border-radius: 12px;
    padding: 12px 20px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .search-btn:hover { background: #7d75ff; }
  .search-btn:active { transform: scale(0.97); }
  .search-btn:disabled { background: #2a2840; color: #4a4865; cursor: not-allowed; }

  .error { color: #ff6b6b; font-size: 13px; margin-top: 8px; font-family: 'DM Mono', monospace; }

  .main-card {
    background: #13121a;
    border: 1px solid #1e1c2e;
    border-radius: 20px;
    padding: 2rem;
    margin-bottom: 1rem;
    animation: fadeUp 0.4s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .location-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; }
  .location-name { font-size: 28px; font-weight: 800; color: #fff; line-height: 1.1; }
  .location-coords { font-size: 11px; color: #4a4865; font-family: 'DM Mono', monospace; margin-top: 4px; }
  .condition-badge {
    background: #1e1c2e;
    border: 1px solid #2a2840;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    color: #a09ec0;
    font-family: 'DM Mono', monospace;
  }

  .temp-row { display: flex; align-items: flex-end; gap: 1rem; margin-bottom: 2rem; }
  .temp-big { font-size: 80px; font-weight: 800; line-height: 1; color: #fff; letter-spacing: -4px; }
  .temp-unit { font-size: 28px; color: #4a4865; margin-bottom: 12px; font-weight: 400; }
  .feels-like { font-size: 13px; color: #6c6a80; font-family: 'DM Mono', monospace; margin-bottom: 14px; }

  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat-box {
    background: #0e0d16;
    border: 1px solid #1e1c2e;
    border-radius: 12px;
    padding: 14px;
  }
  .stat-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: #4a4865; font-family: 'DM Mono', monospace; margin-bottom: 6px; }
  .stat-value { font-size: 20px; font-weight: 700; color: #e8e6f0; }
  .stat-unit { font-size: 11px; color: #6c6a80; font-weight: 400; }

  .hourly-section { margin-top: 0.5rem; }
  .section-title { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: #4a4865; font-family: 'DM Mono', monospace; margin-bottom: 12px; }
  .hourly-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
  .hourly-scroll::-webkit-scrollbar { display: none; }
  .hour-item {
    background: #0e0d16;
    border: 1px solid #1e1c2e;
    border-radius: 10px;
    padding: 12px 14px;
    text-align: center;
    min-width: 64px;
    flex-shrink: 0;
  }
  .hour-item.now { border-color: #6c63ff; background: #15132a; }
  .hour-time { font-size: 11px; color: #4a4865; font-family: 'DM Mono', monospace; margin-bottom: 6px; }
  .hour-item.now .hour-time { color: #6c63ff; }
  .hour-icon { font-size: 18px; margin-bottom: 4px; }
  .hour-temp { font-size: 14px; font-weight: 700; color: #e8e6f0; }

  .forecast-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
  .forecast-row {
    background: #13121a;
    border: 1px solid #1e1c2e;
    border-radius: 14px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: fadeUp 0.4s ease;
  }
  .forecast-day { font-size: 13px; font-weight: 600; color: #e8e6f0; width: 80px; }
  .forecast-icon { font-size: 20px; width: 32px; text-align: center; }
  .forecast-desc { font-size: 12px; color: #6c6a80; font-family: 'DM Mono', monospace; flex: 1; padding: 0 12px; }
  .forecast-temps { display: flex; gap: 12px; align-items: center; }
  .temp-max { font-size: 15px; font-weight: 700; color: #e8e6f0; }
  .temp-min { font-size: 13px; color: #4a4865; }

  .skeleton { background: linear-gradient(90deg, #1a1826 25%, #201e30 50%, #1a1826 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  .loading-temp { height: 80px; width: 180px; border-radius: 12px; margin-bottom: 1rem; }
  .loading-stat { height: 64px; border-radius: 12px; }

  .placeholder {
    text-align: center;
    padding: 4rem 2rem;
    color: #3d3b52;
  }
  .placeholder-icon { font-size: 48px; margin-bottom: 1rem; opacity: 0.5; }
  .placeholder-text { font-size: 15px; line-height: 1.6; }

  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .temp-big { font-size: 60px; }
    .location-name { font-size: 22px; }
  }
</style>

<div class="app">
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>
  <div class="content">
    <div class="header">
      <h1>Weather Dashboard</h1>
      <div class="search-row">
        <input class="search-input" id="cityInput" type="text" placeholder="Digite uma cidade... ex: São Paulo" />
        <button class="search-btn" id="searchBtn" onclick="searchCity()">Buscar</button>
      </div>
      <div class="error" id="errorMsg" style="display:none"></div>
    </div>

    <div id="currentWeather">
      <div class="main-card">
        <div class="placeholder">
          <div class="placeholder-icon">🌡</div>
          <div class="placeholder-text">Digite uma cidade acima<br>para ver o clima em tempo real</div>
        </div>
      </div>
    </div>

    <div id="forecastSection" style="display:none">
      <div class="section-title" style="margin-bottom:12px">Próximos 7 dias</div>
      <div class="forecast-grid" id="forecastGrid"></div>
    </div>
  </div>
</div>

<script>
const WMO = {
  0: ['☀️','Céu limpo'], 1: ['🌤','Principalmente limpo'], 2: ['⛅','Parcialmente nublado'],
  3: ['☁️','Nublado'], 45: ['🌫','Neblina'], 48: ['🌫','Geada'],
  51: ['🌦','Garoa leve'], 53: ['🌦','Garoa'], 55: ['🌧','Garoa intensa'],
  61: ['🌧','Chuva leve'], 63: ['🌧','Chuva'], 65: ['🌧','Chuva forte'],
  71: ['🌨','Neve leve'], 73: ['🌨','Neve'], 75: ['❄️','Neve intensa'],
  80: ['🌦','Pancadas leves'], 81: ['🌦','Pancadas'], 82: ['⛈','Pancadas fortes'],
  85: ['🌨','Neve em pancadas'], 86: ['🌨','Neve intensa'],
  95: ['⛈','Tempestade'], 96: ['⛈','Tempestade c/ granizo'], 99: ['⛈','Tempestade severa']
};

const days = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

function getWMO(code) {
  return WMO[code] || ['🌡','Desconhecido'];
}

function windDir(deg) {
  const dirs = ['N','NE','L','SE','S','SO','O','NO'];
  return dirs[Math.round(deg / 45) % 8];
}

async function geocode(city) {
  const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=pt&format=json`);
  const d = await r.json();
  if (!d.results || !d.results.length) throw new Error('Cidade não encontrada');
  return d.results[0];
}

async function fetchWeather(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
    `&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,relative_humidity_2m,precipitation` +
    `&hourly=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min` +
    `&timezone=auto&forecast_days=7`;
  const r = await fetch(url);
  return r.json();
}

function showLoading() {
  document.getElementById('currentWeather').innerHTML = `
    <div class="main-card">
      <div style="margin-bottom:1.5rem">
        <div class="skeleton loading-temp"></div>
      </div>
      <div class="stats-grid">
        ${[1,2,3,4].map(()=>`<div class="stat-box"><div class="skeleton loading-stat"></div></div>`).join('')}
      </div>
    </div>`;
  document.getElementById('forecastSection').style.display = 'none';
}

function renderCurrent(geo, data) {
  const c = data.current;
  const [icon, desc] = getWMO(c.weather_code);
  const now = new Date();
  const currentHour = now.getHours();

  const hourlyTemps = data.hourly.temperature_2m.slice(0, 24);
  const hourlyCode = data.hourly.weather_code.slice(0, 24);

  const hourlyHTML = hourlyTemps.map((t, i) => {
    const isNow = i === currentHour;
    const [hIcon] = getWMO(hourlyCode[i]);
    const label = i === 0 ? 'agora' : `${String(i).padStart(2,'0')}h`;
    return `<div class="hour-item${isNow ? ' now' : ''}">
      <div class="hour-time">${isNow ? 'agora' : label}</div>
      <div class="hour-icon">${hIcon}</div>
      <div class="hour-temp">${Math.round(t)}°</div>
    </div>`;
  }).join('');

  document.getElementById('currentWeather').innerHTML = `
    <div class="main-card">
      <div class="location-row">
        <div>
          <div class="location-name">${geo.name}${geo.admin1 ? ', ' + geo.admin1 : ''}</div>
          <div class="location-coords">${geo.country} · ${geo.latitude.toFixed(2)}° ${geo.longitude.toFixed(2)}°</div>
        </div>
        <div class="condition-badge">${icon} ${desc}</div>
      </div>
      <div class="temp-row">
        <div class="temp-big">${Math.round(c.temperature_2m)}</div>
        <div>
          <div class="temp-unit">°C</div>
          <div class="feels-like">sensação ${Math.round(c.apparent_temperature)}°C</div>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-label">Umidade</div>
          <div class="stat-value">${c.relative_humidity_2m}<span class="stat-unit">%</span></div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Vento</div>
          <div class="stat-value">${Math.round(c.wind_speed_10m)}<span class="stat-unit"> km/h</span></div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Direção</div>
          <div class="stat-value">${windDir(c.wind_direction_10m)}<span class="stat-unit"> ${c.wind_direction_10m}°</span></div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Precipitação</div>
          <div class="stat-value">${c.precipitation.toFixed(1)}<span class="stat-unit"> mm</span></div>
        </div>
      </div>
      <div class="hourly-section">
        <div class="section-title">Hoje hora a hora</div>
        <div class="hourly-scroll">${hourlyHTML}</div>
      </div>
    </div>`;
}

function renderForecast(data) {
  const { daily } = data;
  const grid = document.getElementById('forecastGrid');
  const section = document.getElementById('forecastSection');

  grid.innerHTML = daily.time.map((dateStr, i) => {
    const date = new Date(dateStr + 'T12:00:00');
    const dayName = i === 0 ? 'Hoje' : i === 1 ? 'Amanhã' : days[date.getDay()];
    const [icon, desc] = getWMO(daily.weather_code[i]);
    return `<div class="forecast-row">
      <div class="forecast-day">${dayName}</div>
      <div class="forecast-icon">${icon}</div>
      <div class="forecast-desc">${desc}</div>
      <div class="forecast-temps">
        <div class="temp-max">${Math.round(daily.temperature_2m_max[i])}°</div>
        <div class="temp-min">${Math.round(daily.temperature_2m_min[i])}°</div>
      </div>
    </div>`;
  }).join('');

  section.style.display = 'block';
}

async function searchCity() {
  const city = document.getElementById('cityInput').value.trim();
  if (!city) return;

  const btn = document.getElementById('searchBtn');
  const err = document.getElementById('errorMsg');
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Buscando...';
  showLoading();

  try {
    const geo = await geocode(city);
    const data = await fetchWeather(geo.latitude, geo.longitude);
    renderCurrent(geo, data);
    renderForecast(data);
  } catch (e) {
    err.textContent = '⚠ ' + e.message;
    err.style.display = 'block';
    document.getElementById('currentWeather').innerHTML = `
      <div class="main-card">
        <div class="placeholder">
          <div class="placeholder-icon">🌡</div>
          <div class="placeholder-text">Digite uma cidade acima<br>para ver o clima em tempo real</div>
        </div>
      </div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Buscar';
  }
}

document.getElementById('cityInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchCity();
});

searchCity._auto = setTimeout(() => {
  document.getElementById('cityInput').value = 'São Paulo';
  searchCity();
}, 400);
</script>
